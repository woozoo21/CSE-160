<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Blocky Rat</title>
</head>
<body onload="main()">
<canvas id="webgl" width="400" height="400">
Please use a browser that supports "canvas"
</canvas>

<p id="fps">FPS: --</p>

<p>
  Camera Angle <input type="range" min="-180" max="180" value="0" class="slider" id="angleSlide">
</p>
<p>
  Front Leg <input type="range" min="-45" max="45" value="30" class="slider" id="frontLegSlide">
</p>
<p>
  Back Leg <input type="range" min="-45" max="45" value="30" class="slider" id="backLegSlide">
</p>
<p>
  Animation <button id="runBtn">Run</button>
  <button id="crawlBtn">Crawl</button>
  <button id="animOffBtn">Stop</button>
</p>
<p>
  Front Paw <input type="range" min="-45" max="45" value="0" class="slider" id="frontPawSlide">
</p>
<p>
  Back Paw <input type="range" min="-45" max="45" value="0" class="slider" id="backPawSlide">
</p>

<script src="lib/webgl-utils.js"></script>
<script src="lib/webgl-debug.js"></script>
<script src="lib/cuon-utils.js"></script>
<script src="lib/cuon-matrix-cse160.js"></script>
<script src="Triangle.js"></script>
<script src="Circle.js"></script>
<script src="Cube.js"></script>
<script src="BlockyAnimal.js"></script>
</body>
</html>
